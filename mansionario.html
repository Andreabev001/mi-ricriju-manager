<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mansionario — Mi Ricriju</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f5f0;
  --surface: #ffffff;
  --border: #e2ddd5;
  --border2: #ccc8bf;
  --text: #1a1814;
  --text2: #6b6660;
  --text3: #a09c96;
  --accent: #c8392b;
  --accent-light: #fdf0ee;
  --accent-border: #f0b8b2;
  --blue: #1a5fa8;
  --blue-light: #edf4fc;
  --blue-border: #aecef0;
  --green: #2d7a4f;
  --green-light: #edf7f2;
  --amber: #b06a00;
  --amber-light: #fef7ec;
  --amber-border: #f5d49a;
  --radius: 10px;
  --radius-sm: 6px;
  font-family: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.header-logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff;
}
.logo-text { font-size: 15px; font-weight: 600; }
.logo-sub { font-size: 11px; color: var(--text3); }
.header-date { font-size: 12px; color: var(--text2); text-align: right; }

.container { max-width: 800px; margin: 0 auto; padding: 20px 16px; }

/* Selezione ruolo */
.ruolo-select {
  display: flex; gap: 10px; margin-bottom: 20px;
}
.ruolo-btn {
  flex: 1; padding: 14px; border-radius: var(--radius);
  border: 2px solid var(--border); background: var(--surface);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all .15s; text-align: center; color: var(--text2);
}
.ruolo-btn.active-sala { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.ruolo-btn.active-cucina { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }

/* Tab turno */
.turno-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--border); margin-bottom: 20px;
}
.turno-tab {
  padding: 10px 20px; font-size: 13px; font-weight: 500;
  cursor: pointer; border-bottom: 2px solid transparent;
  color: var(--text2); transition: all .15s; white-space: nowrap;
}
.turno-tab.active { border-bottom-color: var(--accent); color: var(--accent); }
.turno-tab.active.cucina { border-bottom-color: var(--blue); color: var(--blue); }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
}
.card-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px;
}
.card-title { font-size: 13px; font-weight: 600; }
.card-prog { font-size: 12px; color: var(--text3); }

/* Progress bar */
.progress-bar {
  height: 4px; background: var(--border); border-radius: 2px;
  margin-bottom: 14px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  transition: width .3s;
}
.progress-fill.cucina { background: var(--blue); }

/* Task rows */
.task-row {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.task-row:last-child { border-bottom: none; padding-bottom: 0; }
.task-row:active { opacity: .7; }

.task-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--border2); flex-shrink: 0; margin-top: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.task-check.done { background: var(--green); border-color: var(--green); }
.task-check.done::after {
  content: '';
  display: block; width: 10px; height: 6px;
  border-left: 2px solid #fff; border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}
.task-check.sala-check { border-color: var(--accent-border); }
.task-check.sala-check:not(.done):hover { border-color: var(--accent); }
.task-check.cucina-check { border-color: var(--blue-border); }
.task-check.cucina-check:not(.done):hover { border-color: var(--blue); }

.task-text {
  font-size: 14px; line-height: 1.45; color: var(--text);
  flex: 1; padding-top: 1px;
}
.task-text.done-text { color: var(--text3); text-decoration: line-through; }

/* Guida */
.guida-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.guida-item:last-child { border-bottom: none; }
.guida-num {
  min-width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.guida-text { font-size: 13px; line-height: 1.5; color: var(--text); }

/* Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 30px; gap: 10px; color: var(--text3); font-size: 13px;
}
.spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border); border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Sync indicator */
.sync-bar {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--text3);
  padding: 8px 16px; background: var(--surface);
  border-top: 1px solid var(--border);
  position: sticky; bottom: 0;
}
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
}
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Tutto fatto banner */
.done-banner {
  display: none; text-align: center; padding: 20px;
  background: var(--green-light); border: 1px solid #a8d9be;
  border-radius: var(--radius); margin-bottom: 16px;
  font-size: 14px; font-weight: 500; color: var(--green);
}

@media (max-width: 480px) {
  .ruolo-btn { padding: 12px 8px; font-size: 13px; }
  .turno-tab { padding: 10px 14px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-icon">M</div>
    <div>
      <div class="logo-text">Mi Ricriju</div>
      <div class="logo-sub">Mansionario</div>
    </div>
  </div>
  <div class="header-date" id="header-date"></div>
</div>

<div class="container">

  <!-- Selezione ruolo -->
  <div class="ruolo-select">
    <button class="ruolo-btn active-sala" id="btn-sala" onclick="setRuolo('sala')">Sala</button>
    <button class="ruolo-btn" id="btn-cucina" onclick="setRuolo('cucina')">Cucina</button>
  </div>

  <!-- Tab turno -->
  <div class="turno-tabs" id="turno-tabs">
    <div class="turno-tab active" data-turno="apertura" onclick="setTurno('apertura',this)">Apertura</div>
    <div class="turno-tab" data-turno="serale" onclick="setTurno('serale',this)">Turno serale</div>
    <div class="turno-tab" data-turno="chiusura" onclick="setTurno('chiusura',this)">Chiusura</div>
    <div class="turno-tab" data-turno="guida" onclick="setTurno('guida',this)">Regole</div>
  </div>

  <!-- Banner tutto fatto -->
  <div class="done-banner" id="done-banner">Tutti i compiti completati!</div>

  <!-- Contenuto -->
  <div id="main-content">
    <div class="loading"><div class="spinner"></div>Caricamento...</div>
  </div>

</div>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-label">Sincronizzato con il gestionale</span>
</div>

<script>
const SUPA_URL = 'https://hlzaghdjqwxijogunans.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsemFnaGRqcXd4aWpvZ3VuYW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzg1MjYsImV4cCI6MjA4ODkxNDUyNn0.jy3EFJw7G50Z7NFETU3Z-NojJlcJePXMuVpBZieuz8U';
const MANS_KEY = 'mriju_mansionario';

const MANS_DEFAULT = {
  sala: {
    apertura: [
      'Lavare il pavimento della sala e del bar',
      'Pulire tutti i tavoli e sistemarli in ordine',
      'Controllare e ricaricare materiali mancanti (tovaglioli, bicchieri, cannucce, zucchero ecc.)',
      'Accendere luci e attrezzature (spillatrice acqua, cassa, radio ecc.)',
      'Sistemare il bancone del bar e preparare le postazioni di lavoro',
      'Verificare la scorta di materiali (tovaglioli, bicchieri, posate, ingredienti cocktail ecc.)',
      'Controllare la pulizia dei bagni e rifornire carta igienica, sapone e prodotti necessari',
      'Controllare la macchina del ghiaccio',
    ],
    serale: [
      'Mantenere sempre il frigo pieno (frigo dentro e frigo deposito)',
      'Controllare e ricaricare materiali mancanti (tovaglioli, bicchieri, cannucce, zucchero ecc.)',
      'Verificare lo stato dei bagni e pulirli se necessario',
      'Accogliere i clienti con cortesia e accompagnarli al tavolo',
      "Chiedere ai clienti se desiderano una bottiglia d'acqua",
      'Servire con professionalità e mantenere puliti tavoli, bancone e sala',
      'Svuotare regolarmente la spazzatura e tenere i bidoni puliti',
      'Evitare l\'uso del telefono personale durante il turno',
      'Sparecchiare i tavoli e il bancone appena possibile',
      'Ricaricare eventuale vetrina dolci, salato e semifreddi',
    ],
    chiusura: [
      'Pulire e riordinare tutti i tavoli',
      'Lavare bicchieri e attrezzature del bar (inclusa vaschetta birra alla spina)',
      'Pulire il bancone del bar e le macchine utilizzate',
      'Passare la scopa e lavare il pavimento della sala e del bagno',
      'Spegnere luci e attrezzature (macchina caffè ecc.)',
      'Assicurarsi che tutte le porte e la cassa siano chiuse correttamente',
    ],
    guida: [
      'Presentarsi sempre in orario al lavoro',
      'In caso di ritardo o assenza, avvisare tempestivamente',
      "Indossare l'abbigliamento fornito dal locale con jeans o abiti decorosi",
      'Mantenere un atteggiamento professionale con clienti e colleghi',
      'Evitare discussioni e conflitti durante il servizio',
      'Non usare il telefono personale durante il turno, salvo emergenze lavorative',
      'Accogliere sempre i clienti con cortesia e sorriso',
      'Sparecchiare i tavoli appena possibile per garantire un servizio fluido',
    ],
  },
  cucina: {
    apertura: [
      'Controllare e accendere le attrezzature necessarie (forni, piastre, friggitrici ecc.)',
      'Verificare la scorta di ingredienti e materie prime, segnalare mancanze',
      'Controllare le date di scadenza e organizzare le scorte secondo il principio FIFO',
      'Pulire e sanificare i piani di lavoro prima di qualsiasi preparazione',
      'Verificare che coltelli e strumenti di lavoro siano al loro posto e in buone condizioni',
      'Controllare la temperatura dei frigoriferi e segnalare anomalie',
      'Preparare le posate per il servizio',
    ],
    serale: [
      'Mantenere ordine e pulizia in cucina durante tutta la preparazione',
      'Preparare i piatti rispettando le comande e i tempi di uscita',
      'Evitare sprechi e utilizzo eccessivo di materie prime',
      'Smaltire correttamente i rifiuti (umido, plastica, vetro ecc.)',
      'Verificare costantemente la pulizia delle attrezzature e degli utensili',
      'Controllare che i frigoriferi siano sempre chiusi e ordinati',
      'Mantenere comunicazione chiara e rispettosa con il personale di sala',
      'Segnalare immediatamente problemi con forniture, attrezzature o ingredienti',
    ],
    chiusura: [
      'Pulire e sanificare tutti i piani di lavoro, attrezzature e utensili',
      'Spegnere e mettere in sicurezza le attrezzature secondo le procedure',
      'Controllare che tutti i frigoriferi e congelatori siano ben chiusi',
      'Smaltire correttamente i rifiuti e svuotare i bidoni',
      'Lavare i pavimenti con prodotti adeguati',
      'Verificare e segnalare le scorte da ricaricare per il turno successivo',
      'Assicurarsi che la cucina sia completamente pulita prima di lasciare il locale',
    ],
    guida: [
      'Presentarsi sempre in orario al lavoro',
      'In caso di ritardo o assenza, avvisare tempestivamente',
      'Mantenere un atteggiamento professionale e rispettoso con colleghi e responsabili',
      'Evitare discussioni e conflitti durante il servizio',
      'Collaborare con il personale di sala per garantire tempi di uscita corretti',
      'Rispettare sempre il principio FIFO per la gestione delle scorte',
      'Segnalare subito qualsiasi problema con attrezzature, forniture o ingredienti',
      'Mantenere la cucina completamente pulita prima di lasciare il locale',
    ],
  },
};

let currentRuolo = 'sala';
let currentTurno = 'apertura';
let checksCache = {};

function mansData() {
  try { return JSON.parse(localStorage.getItem(MANS_KEY)) || JSON.parse(JSON.stringify(MANS_DEFAULT)); }
  catch(e) { return JSON.parse(JSON.stringify(MANS_DEFAULT)); }
}

function today() { return new Date().toISOString().slice(0,10); }

function setSyncing(on) {
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot' + (on ? ' syncing' : '');
  lbl.textContent = on ? 'Sincronizzazione...' : 'Sincronizzato con il gestionale';
}

async function loadChecks() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/mansionario_checks?giorno=eq.${today()}&select=ruolo,turno,task_index,fatto`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const rows = await res.json();
    checksCache = {};
    rows.forEach(r => { if(r.fatto) checksCache[r.ruolo+'_'+r.turno+'_'+r.task_index] = true; });
  } catch(e) {}
}

async function setCheck(ruolo, turno, idx, val) {
  checksCache[ruolo+'_'+turno+'_'+idx] = val;
  setSyncing(true);
  try {
    await fetch(`${SUPA_URL}/rest/v1/mansionario_checks`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ giorno: today(), ruolo, turno, task_index: idx, fatto: val, fatto_alle: new Date().toISOString() })
    });
  } catch(e) {}
  setSyncing(false);
}

function setRuolo(ruolo) {
  currentRuolo = ruolo;
  document.getElementById('btn-sala').className = 'ruolo-btn' + (ruolo==='sala' ? ' active-sala' : '');
  document.getElementById('btn-cucina').className = 'ruolo-btn' + (ruolo==='cucina' ? ' active-cucina' : '');
  document.querySelectorAll('.turno-tab').forEach(t => {
    t.className = 'turno-tab' + (t.dataset.turno === currentTurno ? ' active' : '') + (ruolo==='cucina' ? ' cucina' : '');
  });
  render();
}

function setTurno(turno, el) {
  currentTurno = turno;
  document.querySelectorAll('.turno-tab').forEach(t => {
    t.className = 'turno-tab' + (t.dataset.turno === turno ? ' active' : '') + (currentRuolo==='cucina' ? ' cucina' : '');
  });
  render();
}

function render() {
  const data = mansData();
  const tasks = (data[currentRuolo] && data[currentRuolo][currentTurno]) ? data[currentRuolo][currentTurno] : [];
  const content = document.getElementById('main-content');
  const banner = document.getElementById('done-banner');
  const isSala = currentRuolo === 'sala';
  const color = isSala ? 'var(--accent)' : 'var(--blue)';
  const bg = isSala ? 'var(--accent-light)' : 'var(--blue-light)';
  const border = isSala ? 'var(--accent-border)' : 'var(--blue-border)';
  const checkClass = isSala ? 'sala-check' : 'cucina-check';

  if (currentTurno === 'guida') {
    banner.style.display = 'none';
    content.innerHTML = `<div class="card">
      <div class="card-head">
        <span class="card-title" style="display:flex;align-items:center;gap:8px">
          <span style="background:${bg};color:${color};border:1px solid ${border};border-radius:6px;padding:2px 10px;font-size:11px;font-weight:600">${currentRuolo.toUpperCase()}</span>
          Regole e comportamento
        </span>
      </div>
      ${tasks.map((t,i) => `
        <div class="guida-item">
          <div class="guida-num" style="background:${bg};color:${color};border:1px solid ${border}">${i+1}</div>
          <div class="guida-text">${t}</div>
        </div>`).join('')}
    </div>`;
    return;
  }

  let done = 0;
  tasks.forEach((_,i) => { if(checksCache[currentRuolo+'_'+currentTurno+'_'+i]) done++; });
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
  banner.style.display = (done === tasks.length && tasks.length > 0) ? 'block' : 'none';

  const turnoLabel = {apertura:'Checklist apertura',serale:'Turno serale',chiusura:'Checklist chiusura'}[currentTurno];

  content.innerHTML = `<div class="card">
    <div class="card-head">
      <span class="card-title" style="display:flex;align-items:center;gap:8px">
        <span style="background:${bg};color:${color};border:1px solid ${border};border-radius:6px;padding:2px 10px;font-size:11px;font-weight:600">${currentRuolo.toUpperCase()}</span>
        ${turnoLabel}
      </span>
      <span class="card-prog">${done}/${tasks.length}</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill${isSala?'':' cucina'}" style="width:${pct}%"></div>
    </div>
    ${tasks.map((t,i) => {
      const checked = !!checksCache[currentRuolo+'_'+currentTurno+'_'+i];
      return `<div class="task-row" onclick="toggleTask(${i})">
        <div class="task-check ${checkClass}${checked?' done':''}" id="chk-${i}"></div>
        <div class="task-text${checked?' done-text':''}" id="txt-${i}">${t}</div>
      </div>`;
    }).join('')}
  </div>`;
}

async function toggleTask(idx) {
  const key = currentRuolo+'_'+currentTurno+'_'+idx;
  const newVal = !checksCache[key];
  checksCache[key] = newVal;

  const chk = document.getElementById('chk-'+idx);
  const txt = document.getElementById('txt-'+idx);
  if (chk) chk.className = 'task-check ' + (currentRuolo==='sala'?'sala-check':'cucina-check') + (newVal?' done':'');
  if (txt) txt.className = 'task-text' + (newVal?' done-text':'');

  // aggiorna contatore e progress
  const data = mansData();
  const tasks = (data[currentRuolo]&&data[currentRuolo][currentTurno])||[];
  let done = 0;
  tasks.forEach((_,i) => { if(checksCache[currentRuolo+'_'+currentTurno+'_'+i]) done++; });
  const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
  const prog = document.querySelector('.card-prog');
  if (prog) prog.textContent = done+'/'+tasks.length;
  const fill = document.querySelector('.progress-fill');
  if (fill) fill.style.width = pct+'%';
  document.getElementById('done-banner').style.display = (done===tasks.length && tasks.length>0) ? 'block' : 'none';

  await setCheck(currentRuolo, currentTurno, idx, newVal);
}

async function init() {
  // data header
  const d = new Date();
  document.getElementById('header-date').innerHTML =
    d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'}) +
    '<br><span style="color:var(--text3)">' + d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}) + '</span>';

  // carica checks da Supabase
  await loadChecks();
  render();
}

init();
</script>
</body>
</html>
