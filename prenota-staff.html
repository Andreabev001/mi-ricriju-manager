<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#7a2e0e">
<title>Nuova Prenotazione — Staff</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#7a2e0e;--accent-d:#5c2008;--accent-l:#fdf3e7;--accent-border:#e8c9a0;
  --bg:#fdf8f0;--surface:#fff;--border:#ede5d8;--border2:#d6c9b8;
  --text:#2c1a0e;--text2:#7a6555;--text3:#b0a090;
  --green:#2d7a4f;--green-l:#edf7f2;--green-b:#a8d9be;
  --blue:#1a5fa8;--blue-l:#edf4fc;--blue-b:#aecef0;
  --red:#c0392b;--red-l:#fdf0ee;
  font-family:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--accent);padding:14px 20px;display:flex;align-items:center;gap:12px}
.header img{width:36px;height:22px;object-fit:cover;border-radius:6px}
.header-title{font-size:16px;font-weight:700;color:#fff}
.header-sub{font-size:12px;color:rgba(255,255,255,.7)}

.container{max-width:480px;margin:0 auto;padding:20px 16px 40px}

.badge{border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;display:none;align-items:center;gap:10px}
.badge.show{display:flex}
.badge.abituale{background:var(--green-l);border:1px solid var(--green-b);color:var(--green)}
.badge.nuovo{background:var(--blue-l);border:1px solid var(--blue-b);color:var(--blue)}
.badge.blacklist{background:var(--red-l);border:1px solid #f4a4a4;color:var(--red)}

.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:18px 16px;margin-bottom:14px}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em}
.field-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text);background:var(--bg);outline:none;transition:border .2s;-webkit-appearance:none}
.field-input:focus{border-color:var(--accent);background:var(--surface)}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.coperti-row{display:flex;gap:6px;flex-wrap:wrap}
.cop-btn{padding:9px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.cop-btn.active{border-color:var(--accent);background:var(--accent-l);color:var(--accent)}

.btn-primary{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:active{background:var(--accent-d)}
.btn-primary:disabled{background:var(--border2);cursor:not-allowed}

.success{display:none;text-align:center;padding:30px 0}
.success-icon{font-size:56px;margin-bottom:14px}
.success-title{font-size:20px;font-weight:700;margin-bottom:8px}
.success-sub{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.success-detail{background:var(--accent-l);border:1px solid var(--accent-border);border-radius:12px;padding:14px;text-align:left;margin-bottom:20px}
.detail-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--accent-border);font-size:13px}
.detail-row:last-child{border:none}
.btn-altro{width:100%;padding:13px;background:transparent;color:var(--accent);border:1.5px solid var(--accent-border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer}

.error-msg{font-size:13px;color:var(--red);text-align:center;margin-top:8px;min-height:16px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c1a0e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

<div class="container">

  <!-- FORM -->
  <div id="view-form">
    <div id="cliente-badge" class="badge"></div>

    <div class="card">
      <div class="field">
        <label class="field-label">Nome cliente *</label>
        <input type="text" id="inp-nome" class="field-input" placeholder="Es: Mario Rossi" autocomplete="off" oninput="checkCliente(this.value)">
      </div>
      <div class="field">
        <label class="field-label">Telefono</label>
        <input type="tel" id="inp-tel" class="field-input" placeholder="Es: 333 1234567" autocomplete="off">
      </div>
    </div>

    <div class="card">
      <div class="field field-grid">
        <div>
          <label class="field-label">Data *</label>
          <input type="date" id="inp-data" class="field-input">
        </div>
        <div>
          <label class="field-label">Orario *</label>
          <input type="time" id="inp-orario" class="field-input" value="20:00">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Coperti</label>
        <div class="coperti-row">
          <button class="cop-btn" onclick="setCop(1)">1</button>
          <button class="cop-btn active" onclick="setCop(2)">2</button>
          <button class="cop-btn" onclick="setCop(3)">3</button>
          <button class="cop-btn" onclick="setCop(4)">4</button>
          <button class="cop-btn" onclick="setCop(5)">5</button>
          <button class="cop-btn" onclick="setCop(6)">6</button>
          <button class="cop-btn" onclick="setCop(8)">8</button>
          <button class="cop-btn" onclick="setCop(10)">10</button>
          <button class="cop-btn" id="cop-custom-btn" onclick="showCustomCop()">+</button>
        </div>
        <input type="number" id="inp-cop-custom" class="field-input" placeholder="Numero coperti" style="display:none;margin-top:8px" min="1">
      </div>
      <div class="field" style="margin-bottom:0">
        <label class="field-label">Note</label>
        <input type="text" id="inp-note" class="field-input" placeholder="Es: Compleanno, allergie, tavolo esterno...">
      </div>
    </div>

    <div class="error-msg" id="err-msg"></div>
    <button class="btn-primary" id="btn-salva" onclick="salva()">Salva prenotazione</button>
  </div>

  <!-- SUCCESS -->
  <div id="view-success" class="success">
    <div class="success-icon">✅</div>
    <div class="success-title">Prenotazione salvata!</div>
    <div class="success-sub">La prenotazione è stata registrata con successo.</div>
    <div class="success-detail">
      <div class="detail-row"><span style="color:var(--text2)">Nome</span><span id="suc-nome" style="font-weight:500"></span></div>
      <div class="detail-row"><span style="color:var(--text2)">Data</span><span id="suc-data" style="font-weight:500"></span></div>
      <div class="detail-row"><span style="color:var(--text2)">Orario</span><span id="suc-orario" style="font-weight:500"></span></div>
      <div class="detail-row"><span style="color:var(--text2)">Persone</span><span id="suc-cop" style="font-weight:500"></span></div>
    </div>
    <button class="btn-altro" onclick="nuova()">+ Altra prenotazione</button>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://hlzaghdjqwxijogunans.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsemFnaGRqcXd4aWpvZ3VuYW5zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzg1MjYsImV4cCI6MjA4ODkxNDUyNn0.jy3EFJw7G50Z7NFETU3Z-NojJlcJePXMuVpBZieuz8U';
const SUPA_H = { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' };

var selectedCop = 2;
var prenData = [];
var blData = [];

// Set today as default
var today = new Date().toISOString().slice(0,10);
document.getElementById('inp-data').value = today;
document.getElementById('inp-data').min = today;

// Load existing data for cliente check
async function loadData() {
  try {
    var r1 = await fetch(SUPA_URL + '/rest/v1/prenotazioni?select=nome,telefono,data&order=data.desc&limit=500', { headers: SUPA_H });
    var r2 = await fetch(SUPA_URL + '/rest/v1/blacklist?select=nome,telefono,motivo', { headers: SUPA_H });
    prenData = await r1.json();
    blData = await r2.json();
    if (!Array.isArray(prenData)) prenData = [];
    if (!Array.isArray(blData)) blData = [];
  } catch(e) {}
}
loadData();

function normName(s) { return (s||'').toLowerCase().trim().replace(/\s+/g,' ').split(' ').sort().join(' '); }

function checkCliente(val) {
  var badge = document.getElementById('cliente-badge');
  var v = normName(val);
  if (v.length < 2) { badge.className='badge'; return; }
  var tel = document.getElementById('inp-tel').value.replace(/[^0-9]/g,'');
  // Check blacklist
  var ban = blData.find(function(b){ return normName(b.nome)===v || (tel.length>5 && (b.telefono||'').replace(/[^0-9]/g,'')===tel); });
  if (ban) {
    badge.className = 'badge blacklist show';
    badge.innerHTML = '<span style="font-size:18px">⛔</span><strong>BLACKLIST</strong> — ' + (ban.motivo||'');
    return;
  }
  // Check abituale
  var storico = prenData.filter(function(p){ return normName(p.nome)===v || (tel.length>5 && (p.telefono||'').replace(/[^0-9]/g,'')===tel); });
  if (storico.length > 0) {
    var ultima = storico[0];
    var d = new Date(ultima.data+'T12:00:00');
    badge.className = 'badge abituale show';
    badge.innerHTML = '<span>✓</span><span><strong>Cliente abituale</strong> — ' + storico.length + ' prenotazion' + (storico.length===1?'e':'i') + '. Ultima: ' + d.toLocaleDateString('it-IT',{day:'numeric',month:'long'}) + '</span>';
  } else {
    badge.className = 'badge nuovo show';
    badge.innerHTML = '<span>★</span><span>Nuovo cliente</span>';
  }
}

function setCop(n) {
  selectedCop = n;
  document.querySelectorAll('.cop-btn').forEach(function(b){ b.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('inp-cop-custom').style.display = 'none';
}

function showCustomCop() {
  document.querySelectorAll('.cop-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('cop-custom-btn').classList.add('active');
  var inp = document.getElementById('inp-cop-custom');
  inp.style.display = 'block';
  inp.focus();
  inp.oninput = function(){ selectedCop = parseInt(this.value)||0; };
}

async function salva() {
  var nome = document.getElementById('inp-nome').value.trim();
  var tel = document.getElementById('inp-tel').value.trim();
  var data = document.getElementById('inp-data').value;
  var orario = document.getElementById('inp-orario').value;
  var note = document.getElementById('inp-note').value.trim();
  var err = document.getElementById('err-msg');

  if (!nome) { err.textContent='Inserisci il nome del cliente.'; return; }
  if (!data) { err.textContent='Inserisci la data.'; return; }
  if (!orario) { err.textContent='Inserisci l'orario.'; return; }
  if (!selectedCop) { err.textContent='Seleziona il numero di coperti.'; return; }
  err.textContent = '';

  var btn = document.getElementById('btn-salva');
  btn.disabled = true; btn.textContent = 'Salvataggio...';

  try {
    var res = await fetch(SUPA_URL + '/rest/v1/prenotazioni', {
      method: 'POST',
      headers: Object.assign({}, SUPA_H, { 'Prefer': 'return=minimal' }),
      body: JSON.stringify({ nome:nome, telefono:tel, data:data, orario:orario, coperti:String(selectedCop), note:note })
    });

    if (res.ok || res.status === 201) {
      var d = new Date(data+'T12:00:00');
      var gg = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
      var mm = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];
      document.getElementById('suc-nome').textContent = nome;
      document.getElementById('suc-data').textContent = gg[d.getDay()] + ' ' + d.getDate() + ' ' + mm[d.getMonth()];
      document.getElementById('suc-orario').textContent = orario;
      document.getElementById('suc-cop').textContent = selectedCop + (selectedCop===1?' persona':' persone');
      document.getElementById('view-form').style.display = 'none';
      document.getElementById('view-success').style.display = 'block';
    } else {
      err.textContent = 'Errore nel salvataggio. Riprova.';
    }
  } catch(e) {
    err.textContent = 'Errore di connessione. Controlla internet.';
  }
  btn.disabled = false; btn.textContent = 'Salva prenotazione';
}

function nuova() {
  document.getElementById('view-success').style.display = 'none';
  document.getElementById('view-form').style.display = 'block';
  document.getElementById('inp-nome').value = '';
  document.getElementById('inp-tel').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('inp-data').value = today;
  document.getElementById('inp-orario').value = '20:00';
  document.getElementById('cliente-badge').className = 'badge';
  selectedCop = 2;
  document.querySelectorAll('.cop-btn').forEach(function(b,i){ b.classList.toggle('active',i===1); });
  document.getElementById('inp-cop-custom').style.display = 'none';
  document.getElementById('err-msg').textContent = '';
}
</script>
</body>
</html>
